name: Code Quality Check

on:
  pull_request:
    branches: [ main, dev ]  # Trigger on PRs to main or dev branches
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'  # Use Eclipse Temurin distribution
        java-version: '17'       # Use Java 17, adjust as needed for your project
        cache: gradle
    
    - name: Change to project directory
      run: cd SuperRealisticPets
        
    - name: Check if Gradle wrapper exists
      id: gradle-wrapper-check
      run: |
        if [ -f "SuperRealisticPets/gradlew" ]; then
          echo "wrapper_exists=true" >> $GITHUB_OUTPUT
        else
          echo "wrapper_exists=false" >> $GITHUB_OUTPUT
          echo "Gradle wrapper not found. Will use installed Gradle instead."
        fi
        
    - name: Make Gradle wrapper executable (if exists)
      if: steps.gradle-wrapper-check.outputs.wrapper_exists == 'true'
      run: chmod +x SuperRealisticPets/gradlew
      
    - name: Run core tests with wrapper
      if: steps.gradle-wrapper-check.outputs.wrapper_exists == 'true'
      run: cd SuperRealisticPets && ./gradlew core:test
